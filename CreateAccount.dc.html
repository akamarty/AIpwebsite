<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<![CDATA[
<helmet>
<link rel="stylesheet" href="styles.css">
<style>
body{margin:0}
a{color:var(--color-accent)}
a:hover{color:var(--color-accent-700)}
</style>
</helmet>
<div class="gradient-bar"></div>
<div data-screen-label="Create Account" style="min-height:100vh;display:grid;grid-template-columns:1fr 1fr;font-family:var(--font-body)">

  <div style="background:var(--color-accent);color:var(--color-bg);padding:var(--space-8);display:flex;flex-direction:column;justify-content:space-between">
    <a href="index.html" style="color:var(--color-bg);text-decoration:none;font-family:var(--font-heading);font-weight:800;font-size:18px">sophiapilot</a>
    <div>
      <h6 style="color:var(--color-bg);opacity:0.85">FREE ACCOUNT</h6>
      <h1 style="color:var(--color-bg);font-size:44px;margin-bottom:var(--space-6)">Unlock the full story of your Porsche.</h1>
      <div style="display:flex;flex-direction:column;gap:var(--space-3)">
        <sc-for list="{{ benefits }}" as="b" hint-placeholder-count="6">
          <div style="display:flex;gap:var(--space-2);align-items:flex-start">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:2px"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span style="font-size:15px">{{ b }}</span>
          </div>
        </sc-for>
      </div>
    </div>
    <p style="font-size:12px;opacity:0.7;margin:0">© 2026 sophiapilot</p>
  </div>

  <div style="background:var(--color-bg);color:var(--color-text);display:flex;align-items:center;justify-content:center;padding:var(--space-8)">
    <div style="width:100%;max-width:380px">
      <h2 style="margin-bottom:var(--space-1)">Create your free account</h2>
      <p class="text-muted" style="margin-bottom:var(--space-6)">Takes about 15 seconds. No credit card.</p>

      <div style="display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4)">
        <button class="btn btn-secondary" style="justify-content:center;padding:10px">Continue with Google</button>
        <button class="btn btn-secondary" style="justify-content:center;padding:10px">Continue with Apple</button>
      </div>

      <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-4)">
        <hr class="hr" style="flex:1;margin:0"></hr>
        <span class="text-muted" style="font-size:12px">OR</span>
        <hr class="hr" style="flex:1;margin:0"></hr>
      </div>

      <form onSubmit="{{ handleSubmit }}">
        <div class="field" style="margin-bottom:var(--space-3)">
          <label>Email</label>
          <input class="input" type="email" placeholder="you@rennlist.com" value="{{ email }}" onChange="{{ handleEmailChange }}"></input>
        </div>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label>Password</label>
          <input class="input" type="password" placeholder="8+ characters" value="{{ password }}" onChange="{{ handlePasswordChange }}"></input>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="justify-content:center">Create free account</button>
      </form>

      <p style="font-size:12px;margin-top:var(--space-4)" class="text-muted">By continuing you agree to the Terms and Privacy Policy.</p>
      <p style="font-size:14px;margin-top:var(--space-3)">Already have an account? <a href="CreateAccount.dc.html">Log in</a></p>
    </div>
  </div>
</div>
]]>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: "", password: "" };
  renderVals() {
    return {
      benefits: [
        "Collector Score for every VIN",
        "Live market value estimates",
        "Full auction history",
        "Save unlimited VINs to your Garage",
        "Unlimited VIN searches",
        "Rare option & PTS alerts"
      ],
      email: this.state.email,
      password: this.state.password,
      handleEmailChange: (e) => this.setState({ email: e.target.value }),
      handlePasswordChange: (e) => this.setState({ password: e.target.value }),
      handleSubmit: (e) => { e.preventDefault(); window.location.href = "VinResults.dc.html"; }
    };
  }
}
</script>
</body>
</html>
